<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="450" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Invoice Reminder System — n8n Workflow</text>
  <text x="450" y="65" font-family="Arial,sans-serif" font-size="12" fill="#8888cc" text-anchor="middle">Automated payment follow-up with tiered escalation strategy</text>
  <!-- Node: Schedule Trigger -->
  <rect x="30" y="200" width="130" height="80" rx="10" fill="#2d2d5e" stroke="#6666cc" stroke-width="2"/>
  <text x="95" y="230" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">⏰ Schedule</text>
  <text x="95" y="248" font-family="Arial,sans-serif" font-size="10" fill="#aaaadd" text-anchor="middle">Trigger</text>
  <text x="95" y="266" font-family="Arial,sans-serif" font-size="9" fill="#8888bb" text-anchor="middle">Daily cron job</text>
  <!-- Arrow 1 -->
  <line x1="160" y1="240" x2="195" y2="240" stroke="#6666cc" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Node: Google Sheets Read -->
  <rect x="195" y="200" width="130" height="80" rx="10" fill="#1e3a2f" stroke="#27ae60" stroke-width="2"/>
  <text x="260" y="230" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">📄 Read Invoices</text>
  <text x="260" y="248" font-family="Arial,sans-serif" font-size="10" fill="#aaddbb" text-anchor="middle">Google Sheets</text>
  <text x="260" y="266" font-family="Arial,sans-serif" font-size="9" fill="#88bb99" text-anchor="middle">Load invoice DB</text>
  <!-- Arrow 2 -->
  <line x1="325" y1="240" x2="360" y2="240" stroke="#6666cc" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Node: Calculate Days -->
  <rect x="360" y="200" width="130" height="80" rx="10" fill="#3a2d1e" stroke="#f39c12" stroke-width="2"/>
  <text x="425" y="230" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">📅 Calculate</text>
  <text x="425" y="248" font-family="Arial,sans-serif" font-size="10" fill="#ddbb88" text-anchor="middle">Days Until Due</text>
  <text x="425" y="266" font-family="Arial,sans-serif" font-size="9" fill="#bb9966" text-anchor="middle">Date arithmetic</text>
  <!-- Arrow 3 -->
  <line x1="490" y1="240" x2="525" y2="240" stroke="#6666cc" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Node: Route/Switch -->
  <rect x="525" y="200" width="130" height="80" rx="10" fill="#2d1e3a" stroke="#9b59b6" stroke-width="2"/>
  <text x="590" y="230" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">🔀 Route</text>
  <text x="590" y="248" font-family="Arial,sans-serif" font-size="10" fill="#ccaadd" text-anchor="middle">Escalation Logic</text>
  <text x="590" y="266" font-family="Arial,sans-serif" font-size="9" fill="#aa88bb" text-anchor="middle">7d / 3d / Overdue</text>
  <!-- Branch arrows down -->
  <line x1="590" y1="280" x2="590" y2="320" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Node: Send Email -->
  <rect x="525" y="320" width="130" height="80" rx="10" fill="#1e2d3a" stroke="#3498db" stroke-width="2"/>
  <text x="590" y="350" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">📧 Send Email</text>
  <text x="590" y="368" font-family="Arial,sans-serif" font-size="10" fill="#88bbdd" text-anchor="middle">Gmail</text>
  <text x="590" y="386" font-family="Arial,sans-serif" font-size="9" fill="#6699bb" text-anchor="middle">Client reminder</text>
  <!-- Arrow right from Route -->
  <line x1="655" y1="240" x2="700" y2="240" stroke="#6666cc" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Node: Telegram Notify -->
  <rect x="700" y="200" width="130" height="80" rx="10" fill="#1e3a3a" stroke="#1abc9c" stroke-width="2"/>
  <text x="765" y="230" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">💬 Telegram</text>
  <text x="765" y="248" font-family="Arial,sans-serif" font-size="10" fill="#88ddcc" text-anchor="middle">Admin Alert</text>
  <text x="765" y="266" font-family="Arial,sans-serif" font-size="9" fill="#66bbaa" text-anchor="middle">Real-time notify</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6666cc"/>
    </marker>
  </defs>
  <!-- Feature badges -->
  <rect x="50" y="430" width="160" height="40" rx="8" fill="#1e3a2f" stroke="#27ae60" stroke-width="1"/>
  <text x="130" y="447" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#27ae60" text-anchor="middle">✓ Tiered Escalation</text>
  <text x="130" y="462" font-family="Arial,sans-serif" font-size="9" fill="#88bb99" text-anchor="middle">7d → 3d → Overdue</text>
  <rect x="230" y="430" width="160" height="40" rx="8" fill="#1e2d3a" stroke="#3498db" stroke-width="1"/>
  <text x="310" y="447" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3498db" text-anchor="middle">✓ Auto Email</text>
  <text x="310" y="462" font-family="Arial,sans-serif" font-size="9" fill="#88bbdd" text-anchor="middle">Personalized templates</text>
  <rect x="410" y="430" width="160" height="40" rx="8" fill="#1e3a3a" stroke="#1abc9c" stroke-width="1"/>
  <text x="490" y="447" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1abc9c" text-anchor="middle">✓ Telegram Alerts</text>
  <text x="490" y="462" font-family="Arial,sans-serif" font-size="9" fill="#88ddcc" text-anchor="middle">Admin notifications</text>
  <rect x="590" y="430" width="160" height="40" rx="8" fill="#3a2d1e" stroke="#f39c12" stroke-width="1"/>
  <text x="670" y="447" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f39c12" text-anchor="middle">✓ Google Sheets</text>
  <text x="670" y="462" font-family="Arial,sans-serif" font-size="9" fill="#ddbb88" text-anchor="middle">Invoice database</text>
  <!-- Footer -->
  <text x="450" y="505" font-family="Arial,sans-serif" font-size="9" fill="#555588" text-anchor="middle">Built with N8N • Gmail API • Google Sheets API • Telegram Bot API</text>
</svg>
